<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#315b43">
  <meta name="description" content="Stock y ventas de Flor Mia">
  <title>Flor Mia · Stock y Ventas</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/assets/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css?v=17">
</head>
<body>
  <noscript>Necesitás habilitar JavaScript para usar Flor Mia.</noscript>

  <div id="loading-screen" class="screen center-screen">
    <div class="brand-mark">FM</div>
    <p>Cargando Flor Mia…</p>
  </div>

  <main id="login-screen" class="screen center-screen hidden" aria-labelledby="login-title">
    <form id="login-form" class="login-card">
      <div class="brand-mark">FM</div>
      <h1 id="login-title">Flor Mia</h1>
      <p class="muted">Stock y ventas</p>
      <label>Email<input id="login-email" type="email" autocomplete="username" required></label>
      <label>Contraseña<input id="login-password" type="password" autocomplete="current-password" required></label>
      <button class="btn btn-primary btn-block" type="submit">Ingresar</button>
      <p id="login-error" class="form-error" role="alert"></p>
    </form>
  </main>

  <div id="app-screen" class="hidden"></div>
  <div id="toast-region" class="toast-region" aria-live="polite"></div>
  <div id="modal-root"></div>

  <script src="/firebase-config.js"></script>
  <script type="module" src="/app.js?v=17"></script>
</body>
</html>
