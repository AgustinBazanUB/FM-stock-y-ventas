name: Apply responsive v22

on:
  push:
    branches:
      - agent/responsive-admin-seller-v22
    paths:
      - scripts/apply-responsive-v22.py
      - .github/workflows/apply-responsive-v22.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-responsive-v22.py
      - .github/workflows/apply-responsive-v22.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/responsive-admin-seller-v22
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply patch
        run: python scripts/apply-responsive-v22.py
      - name: Validate JavaScript
        run: |
          node --check admin.js
          node --check seller.js
          node --check app.js
          node --check service-worker.js
      - name: Validate scope
        run: |
          git diff --exit-code -- firestore.rules firestore.indexes.json firebase-config.js firebase-service.js
          git diff --check
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin.js seller.js styles.css index.html app.js service-worker.js
          git commit -m "Mejorar responsive de paneles admin y vendedor"
          git push
