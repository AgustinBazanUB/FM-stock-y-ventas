name: Apply summary v23

on:
  push:
    branches:
      - agent/resumen-diario-stock-sin-duplicados
    paths:
      - scripts/apply-summary-v23.py
      - scripts/test-summary-v23.mjs
      - .github/workflows/apply-summary-v23.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/resumen-diario-stock-sin-duplicados
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply scoped patch
        run: python scripts/apply-summary-v23.py
      - name: Validate JavaScript syntax
        run: |
          node --check admin.js
          node --check app.js
          node --check service-worker.js
      - name: Run controlled summary and stock tests
        run: node scripts/test-summary-v23.mjs
      - name: Validate changed-file scope
        run: |
          python - <<'PY'
          import subprocess
          allowed={"admin.js","styles.css","index.html","app.js","service-worker.js"}
          changed=set(subprocess.check_output(["git","diff","--name-only"],text=True).splitlines())
          unexpected=changed-allowed
          if unexpected:
              raise SystemExit(f"Archivos inesperados: {sorted(unexpected)}")
          if not changed:
              raise SystemExit("El parche no produjo cambios")
          print("Archivos permitidos:", sorted(changed))
          PY
          git diff --check
          git diff --exit-code origin/main -- seller.js firebase-config.js firebase-service.js auth.js payments.js discounts.js offline-sales.js metrics.js firestore.rules firestore.indexes.json
      - name: Commit validated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin.js styles.css index.html app.js service-worker.js
          git commit -m "Hacer diario el resumen y unificar la lista de stock"
          git push
