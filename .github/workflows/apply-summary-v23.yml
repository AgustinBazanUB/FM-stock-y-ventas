name: Apply summary v23

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/resumen-diario-stock-sin-duplicados
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply scoped patch
        id: apply
        continue-on-error: true
        run: python scripts/apply-summary-v23.py > apply-summary-v23.log 2>&1
      - name: Save apply diagnostic
        if: steps.apply.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apply-summary-v23.log
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Guardar diagnóstico temporal del resumen"
          git push
      - name: Report apply failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat apply-summary-v23.log
          exit 1
      - name: Validate JavaScript syntax
        run: |
          node --check admin.js
          node --check app.js
          node --check service-worker.js
      - name: Run controlled summary and stock tests
        run: node scripts/test-summary-v23.mjs
      - name: Validate changed-file scope
        run: |
          python - <<'PY'
          import subprocess
          allowed={"admin.js","styles.css","index.html","app.js","service-worker.js"}
          changed=set(subprocess.check_output(["git","diff","--name-only"],text=True).splitlines())
          unexpected=changed-allowed
          if unexpected:
              raise SystemExit(f"Archivos inesperados: {sorted(unexpected)}")
          print("Cambios generados en esta ejecución:", sorted(changed))
          PY
          git diff --check
          git diff --exit-code origin/main -- seller.js firebase-config.js firebase-service.js auth.js payments.js discounts.js offline-sales.js metrics.js firestore.rules firestore.indexes.json
      - name: Commit validated implementation when needed
        run: |
          if git diff --quiet; then
            echo "La implementación validada ya estaba aplicada."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin.js styles.css index.html app.js service-worker.js
          git commit -m "Hacer diario el resumen y unificar la lista de stock"
          git push
